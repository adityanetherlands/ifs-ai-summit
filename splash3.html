<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFS AI Leadership Summit</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #090b10;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Orbs */
        .orb {
            position: absolute;
            top: 50%;
            left: 50%;
            border-radius: 50%;
            will-change: transform, opacity;
            pointer-events: none;
        }

        .orb-1 {
            width: 90px;
            height: 90px;
            background: #6366f1;
            filter: blur(30px);
            animation: float-1 4s ease-in-out infinite;
        }

        .orb-2 {
            width: 80px;
            height: 80px;
            background: #6366f1;
            filter: blur(28px);
            animation: float-2 3.5s ease-in-out infinite;
        }

        .orb-3 {
            width: 100px;
            height: 100px;
            background: #06b6d4;
            filter: blur(35px);
            animation: float-3 4.2s ease-in-out infinite;
        }

        .orb-4 {
            width: 70px;
            height: 70px;
            background: #06b6d4;
            filter: blur(25px);
            animation: float-4 3.8s ease-in-out infinite;
        }

        .orb-5 {
            width: 75px;
            height: 75px;
            background: #f59e0b;
            filter: blur(28px);
            animation: float-5 4.5s ease-in-out infinite;
        }

        .orb-6 {
            width: 85px;
            height: 85px;
            background: #818cf8;
            filter: blur(32px);
            animation: float-6 3.6s ease-in-out infinite;
        }

        .orb-7 {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #6366f1, #06b6d4);
            filter: blur(25px);
            animation: float-7 4.1s ease-in-out infinite;
        }

        /* Ambient floating animations */
        @keyframes float-1 {
            0%, 100% { margin-top: 0; margin-left: 0; }
            50% { margin-top: -8px; margin-left: 5px; }
        }
        @keyframes float-2 {
            0%, 100% { margin-top: 0; margin-left: 0; }
            50% { margin-top: 6px; margin-left: -7px; }
        }
        @keyframes float-3 {
            0%, 100% { margin-top: 0; margin-left: 0; }
            50% { margin-top: -10px; margin-left: -4px; }
        }
        @keyframes float-4 {
            0%, 100% { margin-top: 0; margin-left: 0; }
            50% { margin-top: 7px; margin-left: 8px; }
        }
        @keyframes float-5 {
            0%, 100% { margin-top: 0; margin-left: 0; }
            50% { margin-top: -5px; margin-left: -9px; }
        }
        @keyframes float-6 {
            0%, 100% { margin-top: 0; margin-left: 0; }
            50% { margin-top: 9px; margin-left: 3px; }
        }
        @keyframes float-7 {
            0%, 100% { margin-top: 0; margin-left: 0; }
            50% { margin-top: -6px; margin-left: 7px; }
        }

        /* Center text */
        .center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        .ifs-title {
            font-family: 'Lexend', sans-serif;
            font-weight: 800;
            font-size: 6rem;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            line-height: 1.1;
        }

        .tagline {
            font-family: 'Lexend', sans-serif;
            font-weight: 600;
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 1rem;
            opacity: 0;
            letter-spacing: -0.02em;
        }

        /* Ripple rings */
        .ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 100px;
            height: 100px;
            border: 2px solid rgba(99, 102, 241, 0.6);
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
        }

        /* Intermittent vibrate effect on Shifting - no color change */
        .glitch {
            position: relative;
            display: inline-block;
        }

        .glitch.shaking {
            animation: glitch-jitter 0.06s steps(2) infinite;
        }

        @keyframes glitch-jitter {
            0% { transform: translate(0); }
            25% { transform: translate(-2px, 1px); }
            50% { transform: translate(1px, -2px); }
            75% { transform: translate(-1px, -1px); }
            100% { transform: translate(2px, 1px); }
        }

        /* Password card - no full overlay, floats over the last frame */
        .password-card-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            padding-bottom: 12vh;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        .password-card-wrapper.visible {
            opacity: 1;
            visibility: visible;
        }

        .password-card {
            background: rgba(24, 27, 35, 0.7);
            border: 1px solid rgba(99, 102, 241, 0.25);
            border-radius: 20px;
            padding: 2.5rem 2.5rem 2rem;
            text-align: center;
            max-width: 380px;
            width: 90%;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(99, 102, 241, 0.08);
        }

        .card-label {
            font-family: 'Lexend', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 1rem;
            letter-spacing: 0.02em;
        }

        .password-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(9, 11, 16, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 10px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            outline: none;
            text-align: center;
            letter-spacing: 0.05em;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .password-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.02em;
        }

        .password-input:focus {
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.12);
        }

        .submit-btn {
            width: 100%;
            padding: 13px;
            margin-top: 0.75rem;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: 'Lexend', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: #f87171;
            font-size: 0.85rem;
            margin-top: 0.75rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .error-message.visible {
            opacity: 1;
        }

        /* Shake animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 50%, 90% { transform: translateX(-6px); }
            30%, 70% { transform: translateX(6px); }
        }

        .password-card.shake {
            animation: shake 0.5s ease;
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .orb { display: none; }
            .ifs-title,
            .tagline { opacity: 1 !important; transform: none !important; }
            .glitch { animation: none; }
            .password-card-wrapper { opacity: 1; visibility: visible; }
            .center-text { display: none; }
        }
    </style>
</head>
<body>
    <!-- Orbs -->
    <div class="orb orb-1" id="orb1"></div>
    <div class="orb orb-2" id="orb2"></div>
    <div class="orb orb-3" id="orb3"></div>
    <div class="orb orb-4" id="orb4"></div>
    <div class="orb orb-5" id="orb5"></div>
    <div class="orb orb-6" id="orb6"></div>
    <div class="orb orb-7" id="orb7"></div>

    <!-- Ripple rings -->
    <div class="ripple" id="ripple1"></div>
    <div class="ripple" id="ripple2"></div>

    <!-- Center text - stays visible as last frame -->
    <div class="center-text">
        <div class="ifs-title" id="ifsTitle">IFS</div>
        <div class="tagline" id="tagline">The Ground Is <span class="glitch" id="shiftingText" data-text="Shifting">Shifting</span></div>
    </div>

    <!-- Password card - floats over the last frame, no full overlay -->
    <div class="password-card-wrapper" id="cardWrapper">
        <div class="password-card" id="passwordCard">
            <div class="card-label">Enter the motto</div>
            <input type="password" class="password-input" id="passwordInput" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="off">
            <button class="submit-btn" id="submitBtn">Enter</button>
            <div class="error-message" id="errorMessage">Incorrect. Try again.</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        window.addEventListener('load', function () {
            // Check reduced motion
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                return;
            }

            var shiftingEl = document.getElementById('shiftingText');

            // Intermittent vibrate: shake for ~0.3s, pause for ~1.2s, repeat a few times then stop
            function runIntermittentShake(times, onDone) {
                var count = 0;
                function burst() {
                    if (count >= times) {
                        shiftingEl.classList.remove('shaking');
                        if (onDone) onDone();
                        return;
                    }
                    shiftingEl.classList.add('shaking');
                    setTimeout(function () {
                        shiftingEl.classList.remove('shaking');
                        count++;
                        setTimeout(burst, 800 + Math.random() * 600);
                    }, 250 + Math.random() * 150);
                }
                burst();
            }

            var tl = gsap.timeline();

            // Initial positions - orbs far off-screen
            var orbs = [
                { el: '#orb1', x: '-120vw', y: '-30vh' },
                { el: '#orb2', x: '110vw', y: '40vh' },
                { el: '#orb3', x: '-80vw', y: '90vh' },
                { el: '#orb4', x: '100vw', y: '-60vh' },
                { el: '#orb5', x: '0vw', y: '-120vh' },
                { el: '#orb6', x: '-110vw', y: '20vh' },
                { el: '#orb7', x: '90vw', y: '80vh' }
            ];

            // Set initial orb positions
            orbs.forEach(function (orb) {
                gsap.set(orb.el, {
                    x: orb.x,
                    y: orb.y,
                    scale: 1.3
                });
            });

            // Orbs converge toward center (0s - 2.5s) - slower, more dramatic
            orbs.forEach(function (orb, i) {
                tl.to(orb.el, {
                    x: 0,
                    y: 0,
                    scale: 0.8,
                    duration: 2.5,
                    ease: 'power2.inOut'
                }, i * 0.12);
            });

            // Orbs fade out at center (2.5s)
            tl.to('.orb', {
                opacity: 0,
                scale: 0,
                duration: 0.5,
                ease: 'power2.in',
                stagger: 0.04
            }, 2.5);

            // IFS text pops in (2.8s)
            tl.fromTo('#ifsTitle', {
                scale: 0.5,
                opacity: 0
            }, {
                scale: 1,
                opacity: 1,
                duration: 0.7,
                ease: 'back.out(2)'
            }, 2.8);

            // Ripple 1 (3.0s)
            tl.to('#ripple1', {
                opacity: 1,
                duration: 0.01
            }, 3.0);
            tl.to('#ripple1', {
                scale: 5,
                opacity: 0,
                duration: 1.0,
                ease: 'power1.out'
            }, 3.0);

            // Ripple 2 (3.3s)
            tl.to('#ripple2', {
                opacity: 1,
                duration: 0.01
            }, 3.3);
            tl.to('#ripple2', {
                scale: 5,
                opacity: 0,
                duration: 1.0,
                ease: 'power1.out'
            }, 3.3);

            // Tagline fades up (3.6s)
            tl.fromTo('#tagline', {
                y: 25,
                opacity: 0
            }, {
                y: 0,
                opacity: 1,
                duration: 0.7,
                ease: 'power2.out'
            }, 3.6);

            // Start intermittent vibrate on "Shifting" (4.3s) - 4 bursts then stops
            tl.call(function () {
                runIntermittentShake(4, function () {
                    // After shaking stops, show the password card
                    document.getElementById('cardWrapper').classList.add('visible');
                    setTimeout(function () {
                        document.getElementById('passwordInput').focus();
                    }, 400);
                });
            }, null, 4.5);

            // Password logic
            var passwordInput = document.getElementById('passwordInput');
            var submitBtn = document.getElementById('submitBtn');
            var passwordCard = document.getElementById('passwordCard');
            var errorMessage = document.getElementById('errorMessage');

            function attemptLogin() {
                var value = passwordInput.value.trim().toLowerCase();
                if (value === 'the ground is shifting') {
                    window.location.href = '/';
                } else {
                    passwordCard.classList.add('shake');
                    errorMessage.classList.add('visible');
                    passwordInput.value = '';
                    setTimeout(function () {
                        passwordCard.classList.remove('shake');
                    }, 500);
                    setTimeout(function () {
                        errorMessage.classList.remove('visible');
                    }, 3000);
                }
            }

            submitBtn.addEventListener('click', attemptLogin);
            passwordInput.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    attemptLogin();
                }
            });
        });
    </script>
</body>
</html>
