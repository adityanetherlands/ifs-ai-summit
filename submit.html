<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Feature Request – IFS AI Summit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #090b10;
  --bg-surface: #181b23;
  --border-default: #2a2f3d;
  --border-accent: #6366f1;
  --text-primary: #f0f1f5;
  --text-secondary: #e4e6ed;
  --text-muted: #9498ad;
  --text-dim: #6b7094;
  --accent-indigo: #6366f1;
  --accent-indigo-light: #818cf8;
  --accent-indigo-glow: rgba(99, 102, 241, 0.12);
  --font-display: 'Lexend', sans-serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; }
body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-secondary);
  line-height: 1.6;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px;
}

.container {
  max-width: 560px;
  width: 100%;
}

.brand {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.brand span { color: var(--accent-indigo-light); }

h1 {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 800;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.subtitle {
  color: var(--text-dim);
  font-size: 14px;
  margin-bottom: 32px;
}

.card {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: 16px;
  padding: 32px;
}

label {
  display: block;
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
}

input, textarea {
  width: 100%;
  background: var(--bg-primary);
  border: 1px solid var(--border-default);
  border-radius: 10px;
  padding: 12px 16px;
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.2s;
}
input:focus, textarea:focus {
  border-color: var(--accent-indigo);
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
}
input::placeholder, textarea::placeholder {
  color: var(--text-dim);
}
textarea {
  min-height: 140px;
  resize: vertical;
}

.field { margin-bottom: 20px; }
.field:last-of-type { margin-bottom: 28px; }

.password-field input {
  font-size: 14px;
  letter-spacing: 0.1em;
}

.btn {
  width: 100%;
  padding: 14px 28px;
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  color: white;
  background: var(--accent-indigo);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}
.btn:hover { background: var(--accent-indigo-light); }
.btn:active { transform: scale(0.98); }
.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.status {
  margin-top: 16px;
  padding: 14px 16px;
  border-radius: 10px;
  font-size: 14px;
  display: none;
}
.status.success {
  display: block;
  background: rgba(34, 197, 94, 0.1);
  border: 1px solid rgba(34, 197, 94, 0.3);
  color: #4ade80;
}
.status.error {
  display: block;
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: #f87171;
}

.footer {
  text-align: center;
  margin-top: 24px;
  font-size: 12px;
  color: var(--text-dim);
}
.footer a { color: var(--accent-indigo-light); text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="container">
  <div class="brand">IFS <span>AI Summit</span></div>
  <h1>Submit a Feature Request</h1>
  <p class="subtitle">Describe a change you'd like made to the summit website. An AI agent will implement it automatically.</p>

  <div class="card">
    <form id="requestForm">
      <div class="field">
        <label for="title">What do you want to change?</label>
        <input type="text" id="title" name="title" placeholder="e.g. Add a countdown timer to the hero section" required>
      </div>

      <div class="field">
        <label for="body">Describe the change in detail</label>
        <textarea id="body" name="body" placeholder="Be specific about what to add or change, where on the site it should appear, and any style preferences." required></textarea>
      </div>

      <div class="field password-field">
        <label for="password">Access code</label>
        <input type="password" id="password" name="password" placeholder="Enter the access code" required>
      </div>

      <button type="submit" class="btn" id="submitBtn">Submit Request</button>
    </form>

    <div class="status" id="status"></div>
  </div>

  <div class="footer">
    <a href="/">Back to summit site</a>
  </div>
</div>

<script>
document.getElementById('requestForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const status = document.getElementById('status');

  btn.disabled = true;
  btn.textContent = 'Submitting...';
  status.className = 'status';
  status.style.display = 'none';

  try {
    const res = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title: document.getElementById('title').value,
        body: document.getElementById('body').value,
        password: document.getElementById('password').value,
      }),
    });

    const data = await res.json();

    if (res.ok) {
      status.className = 'status success';
      status.innerHTML = 'Request submitted successfully! An AI agent will implement this shortly. You can preview changes at <a href="/?ext_edit=true" style="color:#4ade80;">the preview link</a>.';
      status.style.display = 'block';
      document.getElementById('requestForm').reset();
    } else {
      throw new Error(data.error || 'Something went wrong');
    }
  } catch (err) {
    status.className = 'status error';
    status.textContent = err.message === 'Invalid password' ? 'Invalid access code. Please try again.' : 'Error: ' + err.message;
    status.style.display = 'block';
  }

  btn.disabled = false;
  btn.textContent = 'Submit Request';
});
</script>

</body>
</html>
