<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFS AI Leadership Summit</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #090b10;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Orbs - bigger sizes */
        .orb {
            position: absolute;
            border-radius: 50%;
            will-change: transform, opacity;
            pointer-events: none;
        }

        .orb-1 {
            width: 160px;
            height: 160px;
            background: #6366f1;
            filter: blur(40px);
            animation: float-1 4s ease-in-out infinite;
        }

        .orb-2 {
            width: 140px;
            height: 140px;
            background: #6366f1;
            filter: blur(35px);
            animation: float-2 3.5s ease-in-out infinite;
        }

        .orb-3 {
            width: 180px;
            height: 180px;
            background: #06b6d4;
            filter: blur(45px);
            animation: float-3 4.2s ease-in-out infinite;
        }

        .orb-4 {
            width: 120px;
            height: 120px;
            background: #06b6d4;
            filter: blur(32px);
            animation: float-4 3.8s ease-in-out infinite;
        }

        .orb-5 {
            width: 130px;
            height: 130px;
            background: #f59e0b;
            filter: blur(35px);
            animation: float-5 4.5s ease-in-out infinite;
        }

        .orb-6 {
            width: 150px;
            height: 150px;
            background: #818cf8;
            filter: blur(40px);
            animation: float-6 3.6s ease-in-out infinite;
        }

        .orb-7 {
            width: 110px;
            height: 110px;
            background: linear-gradient(135deg, #6366f1, #06b6d4);
            filter: blur(30px);
            animation: float-7 4.1s ease-in-out infinite;
        }

        /* Ambient floating animations */
        @keyframes float-1 {
            0%, 100% { margin-top: 0; margin-left: 0; }
            50% { margin-top: -12px; margin-left: 8px; }
        }
        @keyframes float-2 {
            0%, 100% { margin-top: 0; margin-left: 0; }
            50% { margin-top: 10px; margin-left: -10px; }
        }
        @keyframes float-3 {
            0%, 100% { margin-top: 0; margin-left: 0; }
            50% { margin-top: -14px; margin-left: -6px; }
        }
        @keyframes float-4 {
            0%, 100% { margin-top: 0; margin-left: 0; }
            50% { margin-top: 10px; margin-left: 12px; }
        }
        @keyframes float-5 {
            0%, 100% { margin-top: 0; margin-left: 0; }
            50% { margin-top: -8px; margin-left: -12px; }
        }
        @keyframes float-6 {
            0%, 100% { margin-top: 0; margin-left: 0; }
            50% { margin-top: 12px; margin-left: 5px; }
        }
        @keyframes float-7 {
            0%, 100% { margin-top: 0; margin-left: 0; }
            50% { margin-top: -9px; margin-left: 10px; }
        }

        /* Center glow orb - hidden initially */
        .center-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.7) 0%, rgba(99, 102, 241, 0.3) 40%, rgba(6, 182, 212, 0.15) 65%, transparent 80%);
            filter: blur(30px);
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }

        /* Password card - centered liquid glass */
        .password-card-wrapper {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s ease;
        }

        .password-card-wrapper.visible {
            opacity: 1;
            visibility: visible;
        }

        .password-card {
            position: relative;
            background: linear-gradient(
                135deg,
                rgba(15, 17, 23, 0.65) 0%,
                rgba(24, 27, 35, 0.55) 40%,
                rgba(99, 102, 241, 0.08) 100%
            );
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem 2.5rem 2rem;
            text-align: center;
            max-width: 380px;
            width: 90%;
            backdrop-filter: blur(40px) saturate(1.4);
            -webkit-backdrop-filter: blur(40px) saturate(1.4);
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.6),
                0 0 60px rgba(99, 102, 241, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.08),
                inset 0 -1px 0 rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        /* Liquid glass shimmer highlight */
        .password-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(
                ellipse at 30% 20%,
                rgba(255, 255, 255, 0.06) 0%,
                transparent 50%
            );
            pointer-events: none;
        }

        /* Subtle refraction edge glow */
        .password-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.15) 20%,
                rgba(129, 140, 248, 0.2) 50%,
                rgba(255, 255, 255, 0.15) 80%,
                transparent 100%
            );
            pointer-events: none;
        }

        .card-label {
            font-family: 'Lexend', sans-serif;
            font-weight: 600;
            font-size: 1.05rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 1.2rem;
            letter-spacing: 0.03em;
            position: relative;
        }

        .password-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(9, 11, 16, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            position: relative;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            outline: none;
            text-align: center;
            letter-spacing: 0.05em;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .password-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.02em;
        }

        .password-input:focus {
            border-color: rgba(129, 140, 248, 0.35);
            box-shadow: 0 0 24px rgba(99, 102, 241, 0.15), inset 0 0 12px rgba(99, 102, 241, 0.05);
        }

        .submit-btn {
            width: 100%;
            padding: 13px;
            margin-top: 0.75rem;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.7), rgba(129, 140, 248, 0.5));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            font-family: 'Lexend', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: #f87171;
            font-size: 0.85rem;
            margin-top: 0.75rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .error-message.visible {
            opacity: 1;
        }

        /* Ground shifting tagline */
        .ground-shifting-text {
            font-family: 'Lexend', sans-serif;
            font-weight: 700;
            font-size: 1.35rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 1.4rem;
            letter-spacing: 0.02em;
            position: relative;
        }

        .glitch-word {
            position: relative;
            display: inline-block;
            color: rgba(255, 255, 255, 0.8);
            animation: glitch-main 6s infinite;
        }

        .glitch-word::before,
        .glitch-word::after {
            content: 'shifting';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
        }

        .glitch-word::before {
            color: #0ff;
            animation: glitch-before 6s infinite;
        }

        .glitch-word::after {
            color: #f0f;
            animation: glitch-after 6s infinite;
        }

        @keyframes glitch-before {
            0%, 100% { opacity: 0; transform: none; }
            10% { opacity: 0; }
            10.5% { opacity: 0.8; transform: translateX(-3px) skewX(-8deg); }
            11.5% { opacity: 0.6; transform: translateX(2px) skewX(5deg); }
            12% { opacity: 0; transform: none; }
            30% { opacity: 0; }
            30.5% { opacity: 0.7; transform: translateX(4px) skewX(10deg); }
            31% { opacity: 0.9; transform: translateX(-2px) skewX(-4deg); }
            31.5% { opacity: 0; transform: none; }
            55% { opacity: 0; }
            55.5% { opacity: 0.8; transform: translateX(-4px) skewX(-12deg); }
            56.5% { opacity: 0.5; transform: translateX(3px) skewX(6deg); }
            57% { opacity: 0; transform: none; }
            78% { opacity: 0; }
            78.5% { opacity: 0.6; transform: translateX(3px) skewX(7deg); }
            79% { opacity: 0.8; transform: translateX(-3px) skewX(-5deg); }
            79.5% { opacity: 0; transform: none; }
        }

        @keyframes glitch-after {
            0%, 100% { opacity: 0; transform: none; }
            10% { opacity: 0; }
            10.5% { opacity: 0.7; transform: translateX(3px) skewX(6deg); }
            11.5% { opacity: 0.8; transform: translateX(-2px) skewX(-8deg); }
            12% { opacity: 0; transform: none; }
            30% { opacity: 0; }
            30.5% { opacity: 0.8; transform: translateX(-3px) skewX(-7deg); }
            31% { opacity: 0.6; transform: translateX(4px) skewX(10deg); }
            31.5% { opacity: 0; transform: none; }
            55% { opacity: 0; }
            55.5% { opacity: 0.6; transform: translateX(4px) skewX(10deg); }
            56.5% { opacity: 0.9; transform: translateX(-2px) skewX(-8deg); }
            57% { opacity: 0; transform: none; }
            78% { opacity: 0; }
            78.5% { opacity: 0.8; transform: translateX(-4px) skewX(-9deg); }
            79% { opacity: 0.5; transform: translateX(2px) skewX(6deg); }
            79.5% { opacity: 0; transform: none; }
        }

        @keyframes glitch-main {
            0%, 100% { text-shadow: none; transform: none; }
            10.5% { text-shadow: 2px 0 #0ff, -2px 0 #f0f; transform: translateX(-1px); }
            11.5% { text-shadow: -2px 0 #0ff, 2px 0 #f0f; transform: translateX(1px); }
            12% { text-shadow: none; transform: none; }
            30.5% { text-shadow: 3px 0 #0ff, -3px 0 #f0f; transform: translateX(2px) skewX(-3deg); }
            31% { text-shadow: -1px 0 #0ff, 1px 0 #f0f; transform: translateX(-1px); }
            31.5% { text-shadow: none; transform: none; }
            55.5% { text-shadow: -2px 0 #0ff, 2px 0 #f0f; transform: translateX(-2px) skewX(2deg); }
            56.5% { text-shadow: 2px 0 #0ff, -2px 0 #f0f; transform: translateX(1px); }
            57% { text-shadow: none; transform: none; }
            78.5% { text-shadow: 2px 0 #0ff, -2px 0 #f0f; transform: translateX(1px) skewX(-2deg); }
            79% { text-shadow: -3px 0 #0ff, 3px 0 #f0f; transform: translateX(-1px); }
            79.5% { text-shadow: none; transform: none; }
        }

        /* Shake animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 50%, 90% { transform: translateX(-6px); }
            30%, 70% { transform: translateX(6px); }
        }

        .password-card.shake {
            animation: shake 0.5s ease;
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .orb, .center-glow { display: none; }
            .password-card-wrapper { opacity: 1; visibility: visible; }
        }

        /* Feature flag */
        .ff-ext-edit { display: none; }
    </style>
</head>
<body>
    <!-- Orbs -->
    <div class="orb orb-1" id="orb1"></div>
    <div class="orb orb-2" id="orb2"></div>
    <div class="orb orb-3" id="orb3"></div>
    <div class="orb orb-4" id="orb4"></div>
    <div class="orb orb-5" id="orb5"></div>
    <div class="orb orb-6" id="orb6"></div>
    <div class="orb orb-7" id="orb7"></div>

    <!-- Center glow - the merged orb -->
    <div class="center-glow" id="centerGlow"></div>

    <!-- Password card -->
    <div class="password-card-wrapper" id="cardWrapper">
        <div class="password-card" id="passwordCard">
            <div class="ground-shifting-text">The ground is <span class="glitch-word">shifting</span><span class="ff-ext-edit"> 😊</span></div>
            <div class="card-label">Enter the motto</div>
            <input type="password" class="password-input" id="passwordInput" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="off">
            <button class="submit-btn" id="submitBtn">Enter</button>
            <div class="error-message" id="errorMessage">Incorrect. Try again.</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        // Feature flag: show ff-ext-edit content when ?ext_edit=true
        if (new URLSearchParams(window.location.search).get('ext_edit') === 'true') {
            document.querySelectorAll('.ff-ext-edit').forEach(function(el) {
                el.style.display = 'inline';
            });
        }

        window.addEventListener('load', function () {
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                return;
            }

            var tl = gsap.timeline();

            // Center each orb on screen using its own dimensions
            var orbEls = document.querySelectorAll('.orb');
            var cx = window.innerWidth / 2;
            var cy = window.innerHeight / 2;
            orbEls.forEach(function (el) {
                el.style.left = (cx - el.offsetWidth / 2) + 'px';
                el.style.top = (cy - el.offsetHeight / 2) + 'px';
            });

            var orbs = [
                { el: '#orb1', x: -window.innerWidth * 0.9, y: -window.innerHeight * 0.4 },
                { el: '#orb2', x: window.innerWidth * 0.8, y: window.innerHeight * 0.45 },
                { el: '#orb3', x: -window.innerWidth * 0.6, y: window.innerHeight * 0.8 },
                { el: '#orb4', x: window.innerWidth * 0.75, y: -window.innerHeight * 0.55 },
                { el: '#orb5', x: window.innerWidth * 0.05, y: -window.innerHeight * 0.9 },
                { el: '#orb6', x: -window.innerWidth * 0.85, y: window.innerHeight * 0.25 },
                { el: '#orb7', x: window.innerWidth * 0.7, y: window.innerHeight * 0.7 }
            ];

            // Set initial positions off-screen
            orbs.forEach(function (orb) {
                gsap.set(orb.el, {
                    x: orb.x,
                    y: orb.y,
                    scale: 1.2
                });
            });

            // Phase 1: Orbs converge to center (0s - 2.0s)
            orbs.forEach(function (orb, i) {
                tl.to(orb.el, {
                    x: 0,
                    y: 0,
                    scale: 0.6,
                    duration: 2.0,
                    ease: 'power2.inOut'
                }, i * 0.06);
            });

            // Phase 2: Orbs shrink and fade into center (2.0s)
            tl.to('.orb', {
                opacity: 0,
                scale: 0,
                duration: 0.5,
                ease: 'power3.in',
                stagger: 0.03
            }, 2.0);

            // Phase 3: Center glow orb blooms large (2.2s)
            tl.fromTo('#centerGlow', {
                opacity: 0,
                scale: 0.2
            }, {
                opacity: 1,
                scale: 1,
                duration: 0.8,
                ease: 'power2.out'
            }, 2.2);

            // Phase 3b: Intensify the glow briefly (2.8s)
            tl.to('#centerGlow', {
                scale: 1.15,
                filter: 'blur(20px)',
                duration: 0.4,
                ease: 'power1.inOut'
            }, 2.8);

            // Phase 4: Glow dims slightly and settles (3.2s)
            tl.to('#centerGlow', {
                scale: 0.9,
                opacity: 0.5,
                filter: 'blur(40px)',
                duration: 0.8,
                ease: 'power2.inOut'
            }, 3.2);

            // Phase 5: Password card fades in (3.8s)
            tl.call(function () {
                document.getElementById('cardWrapper').classList.add('visible');
                setTimeout(function () {
                    document.getElementById('passwordInput').focus();
                }, 300);
            }, null, 3.8);

            // Password logic
            var passwordInput = document.getElementById('passwordInput');
            var submitBtn = document.getElementById('submitBtn');
            var passwordCard = document.getElementById('passwordCard');
            var errorMessage = document.getElementById('errorMessage');

            function attemptLogin() {
                var value = passwordInput.value.trim().toLowerCase();
                if (value === 'speedislife') {
                    window.location.href = '/summit';
                } else {
                    passwordCard.classList.add('shake');
                    errorMessage.classList.add('visible');
                    passwordInput.value = '';
                    setTimeout(function () {
                        passwordCard.classList.remove('shake');
                    }, 500);
                    setTimeout(function () {
                        errorMessage.classList.remove('visible');
                    }, 3000);
                }
            }

            submitBtn.addEventListener('click', attemptLogin);
            passwordInput.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    attemptLogin();
                }
            });
        });
    </script>
</body>
</html>
