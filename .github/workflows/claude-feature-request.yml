name: Claude Feature Request Handler

on:
  issues:
    types: [labeled]

jobs:
  implement-feature:
    if: |
      contains(github.event.issue.labels.*.name, 'feature-request') &&
      !contains(github.event.issue.labels.*.name, 'completed')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          label_trigger: "feature-request"

      - name: Auto-merge Claude branch to main
        run: |
          BRANCH_NAME=$(gh api "repos/${REPO}/branches" --jq '.[].name' | grep "claude/issue-${ISSUE_NUMBER}" | head -1)
          if [ -n "$BRANCH_NAME" ]; then
            echo "Found branch: $BRANCH_NAME"
            SHA=$(gh api "repos/${REPO}/git/refs/heads/${BRANCH_NAME}" --jq '.object.sha')
            echo "Branch SHA: $SHA"
            gh api "repos/${REPO}/merges" -f base=main -f head="$SHA" -f commit_message="Auto-merge: issue #${ISSUE_NUMBER}" || {
              echo "ERROR: Merge failed"; exit 1;
            }
            echo "Merged $BRANCH_NAME into main"
          else
            echo "ERROR: No Claude branch found for issue #${ISSUE_NUMBER}"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}

      - name: Mark issue as completed
        if: success()
        run: |
          gh issue edit "$ISSUE_NUMBER" --add-label "completed"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
