name: Claude Feature Request Handler

on:
  issues:
    types: [labeled]

jobs:
  implement-feature:
    if: |
      contains(github.event.issue.labels.*.name, 'feature-request') &&
      !contains(github.event.issue.labels.*.name, 'completed')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          label_trigger: "feature-request"

      - name: Auto-merge Claude branch to main
        run: |
          BRANCH_NAME=$(gh api "repos/${GITHUB_REPOSITORY}/branches" --jq '.[].name' | grep "claude/issue-${ISSUE_NUMBER}" | head -1)
          if [ -n "$BRANCH_NAME" ]; then
            echo "Found branch: $BRANCH_NAME"
            gh pr create --base main --head "$BRANCH_NAME" --fill-first 2>&1 || true
            PR_NUM=$(gh pr list --head "$BRANCH_NAME" --json number -q '.[0].number')
            if [ -n "$PR_NUM" ]; then
              gh pr merge "$PR_NUM" --merge --admin
              echo "Merged PR #$PR_NUM"
            else
              echo "ERROR: Could not find PR for branch $BRANCH_NAME"
              exit 1
            fi
          else
            echo "ERROR: No Claude branch found for issue #${ISSUE_NUMBER}"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Mark issue as completed
        if: success()
        run: |
          gh issue edit "$ISSUE_NUMBER" --add-label "completed"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
