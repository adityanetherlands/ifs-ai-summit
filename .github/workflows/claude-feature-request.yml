name: Claude Feature Request Handler

on:
  issues:
    types: [labeled]

jobs:
  implement-feature:
    if: |
      contains(github.event.issue.labels.*.name, 'feature-request') &&
      !contains(github.event.issue.labels.*.name, 'completed')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          label_trigger: "feature-request"

      - name: Auto-merge Claude branch to main
        run: |
          BRANCH_NAME=$(gh api repos/${{ github.repository }}/branches --jq '.[].name' | grep "claude/issue-${{ github.event.issue.number }}" | head -1)
          if [ -n "$BRANCH_NAME" ]; then
            echo "Found branch: $BRANCH_NAME"
            PR_URL=$(gh pr create --base main --head "$BRANCH_NAME" --title "Auto-merge: ${{ github.event.issue.title }}" --body "Auto-merging feature request from #${{ github.event.issue.number }}" 2>&1 || true)
            echo "$PR_URL"
            PR_NUM=$(gh pr list --head "$BRANCH_NAME" --json number -q '.[0].number')
            if [ -n "$PR_NUM" ]; then
              gh pr merge "$PR_NUM" --merge --admin
              echo "Merged PR #$PR_NUM"
            fi
          else
            echo "No Claude branch found"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark issue as completed
        if: success()
        run: |
          gh issue edit ${{ github.event.issue.number }} --add-label "completed"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
